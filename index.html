<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="DutchPath — Master Dutch for the integration exam. Go from zero to B2 with structured daily lessons, spaced repetition, and exam preparation.">
    <title>DutchPath — Dutch Integration Exam Prep</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Onboarding Overlay -->
    <div id="onboarding-overlay" class="onboarding-overlay hidden">
        <div id="onboarding-content" class="onboarding-content"></div>
    </div>

    <!-- Main App Layout -->
    <div id="app" class="app-layout hidden">
        <!-- Sidebar Navigation -->
        <nav id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span class="logo-icon">🇳🇱</span>
                    <h1 class="logo-text">DutchPath</h1>
                </div>
                <button id="sidebar-toggle" class="sidebar-toggle" aria-label="Toggle sidebar">
                    <span></span><span></span><span></span>
                </button>
            </div>

            <div class="sidebar-nav">
                <a href="#dashboard" class="nav-item active" data-view="dashboard" id="nav-dashboard">
                    <span class="nav-icon">📊</span>
                    <span class="nav-label">Dashboard</span>
                </a>
                <a href="#lesson" class="nav-item" data-view="lesson" id="nav-lesson">
                    <span class="nav-icon">📖</span>
                    <span class="nav-label">Today's Lesson</span>
                </a>
                <a href="#vocabulary" class="nav-item" data-view="vocabulary" id="nav-vocabulary">
                    <span class="nav-icon">🔤</span>
                    <span class="nav-label">Vocabulary</span>
                </a>
                <a href="#grammar" class="nav-item" data-view="grammar" id="nav-grammar">
                    <span class="nav-icon">📝</span>
                    <span class="nav-label">Grammar</span>
                </a>
                <a href="#flashcards" class="nav-item" data-view="flashcards" id="nav-flashcards">
                    <span class="nav-icon">🃏</span>
                    <span class="nav-label">Flashcards</span>
                </a>
                <a href="#reading" class="nav-item" data-view="reading" id="nav-reading">
                    <span class="nav-icon">📕</span>
                    <span class="nav-label">Reading</span>
                </a>
                <a href="#knm" class="nav-item" data-view="knm" id="nav-knm">
                    <span class="nav-icon">🏛️</span>
                    <span class="nav-label">KNM Exam</span>
                </a>
                <a href="#exam" class="nav-item" data-view="exam" id="nav-exam">
                    <span class="nav-icon">🎯</span>
                    <span class="nav-label">Mock Exams</span>
                </a>
            </div>

            <div class="sidebar-footer">
                <a href="#settings" class="nav-item" data-view="settings" id="nav-settings">
                    <span class="nav-icon">⚙️</span>
                    <span class="nav-label">Settings</span>
                </a>
                <div class="streak-badge" id="streak-badge">
                    <span class="streak-fire">🔥</span>
                    <span class="streak-count" id="streak-count">0</span>
                    <span class="streak-label">day streak</span>
                </div>
            </div>
        </nav>

        <!-- Mobile Top Bar -->
        <header class="mobile-header">
            <button id="mobile-menu-btn" class="mobile-menu-btn" aria-label="Open menu">
                <span></span><span></span><span></span>
            </button>
            <div class="mobile-logo">
                <span>🇳🇱</span> DutchPath
            </div>
            <div class="mobile-streak" id="mobile-streak">
                🔥 <span id="mobile-streak-count">0</span>
            </div>
        </header>

        <!-- Main Content Area -->
        <main id="main-content" class="main-content">
            <div id="view-dashboard" class="view active"></div>
            <div id="view-lesson" class="view"></div>
            <div id="view-vocabulary" class="view"></div>
            <div id="view-grammar" class="view"></div>
            <div id="view-flashcards" class="view"></div>
            <div id="view-reading" class="view"></div>
            <div id="view-knm" class="view"></div>
            <div id="view-exam" class="view"></div>
            <div id="view-settings" class="view"></div>
        </main>
    </div>

    <!-- Mobile Overlay -->
    <div id="mobile-overlay" class="mobile-overlay hidden"></div>

    <!-- Scripts -->
    <script src="js/utils/storage.js"></script>
    <script src="js/utils/srs.js"></script>
    <script src="js/utils/speech.js"></script>
    <script src="js/data/vocabulary.js"></script>
    <script src="js/data/grammar.js"></script>
    <script src="js/data/reading.js"></script>
    <script src="js/data/knm.js"></script>
    <script src="js/data/curriculum.js"></script>
    <script src="js/components/dashboard.js"></script>
    <script src="js/components/onboarding.js"></script>
    <script src="js/components/lesson.js"></script>
    <script src="js/components/flashcards.js"></script>
    <script src="js/components/quiz.js"></script>
    <script src="js/components/knmComponent.js"></script>
    <script src="js/components/exam.js"></script>
    <script src="js/components/settings.js"></script>
    <script src="js/components/vocabulary.js"></script>
    <script src="js/components/grammarComponent.js"></script>
    <script src="js/components/readingComponent.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
